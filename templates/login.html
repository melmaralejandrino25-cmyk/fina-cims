<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - CIMS V10</title>

    <!-- External Theme CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/cims-theme.css', v='10') }}">
</head>

<body class="app-layout auth-layout flex-center min-h-screen">

    <!-- Auth Card Container -->
    <div class="card auth-card p-5 w-full max-w-sm">
        
        <!-- Branding Header -->
        <div class="text-center mb-4">
            <div class="badge text-2xl mb-2" aria-hidden="true">🌽</div>
            <h2 class="m-0 text-xl font-bold text-green">CIMS V10</h2>
            <p class="text-muted text-xs uppercase font-bold tracking-wide mt-1">
                Corn Information Management System
            </p>
        </div>

        <!-- Login Form -->
        <form method="POST" class="flex-column gap-3">
            <div class="form-group">
                <label class="form-label font-bold text-xs uppercase text-muted">Username</label>
                <input type="text"
                       name="username"
                       class="form-control w-full"
                       placeholder="Enter your username"
                       required
                       autofocus>
            </div>

            <div class="form-group">
                <label class="form-label font-bold text-xs uppercase text-muted">Password</label>
                <div class="input-group flex-align gap-1">
                    <input type="password"
                           name="password"
                           id="password"
                           class="form-control w-full"
                           placeholder="Enter your password"
                           required>
                    <button type="button" 
                            class="btn btn-secondary px-3" 
                            onclick="togglePassword()"
                            title="Toggle Password Visibility"
                            aria-label="Toggle Password Visibility">
                        <span id="eye-icon">👁️</span>
                    </button>
                </div>
            </div>

            <button type="submit" class="btn btn-primary w-full mt-2">
                🔑 Login
            </button>
        </form>

        <!-- Flash Alert Messages -->
        {% with messages = get_flashed_messages() %}
        {% if messages %}
            <div class="alert alert-danger mt-4 text-center text-xs font-bold p-3">
                ⚠️ {{ messages[0] }}
            </div>
        {% endif %}
        {% endwith %}

        <!-- Agency Footer -->
        <div class="auth-footer text-center text-muted text-xs mt-4 pt-3 border-top">
            <p class="m-0 font-bold">© 2026 CIMS V10</p>
            <p class="m-0 text-xs">Provincial Agriculture Office</p>
        </div>

    </div>

    <!-- Password Visibility Toggle Script -->
    <script>
        function togglePassword() {
            const passInput = document.getElementById("password");
            const eyeIcon = document.getElementById("eye-icon");

            if (passInput.type === "password") {
                passInput.type = "text";
                eyeIcon.textContent = "🙈";
            } else {
                passInput.type = "password";
                eyeIcon.textContent = "👁️";
            }
        }
    </script>

</body>
</html>
